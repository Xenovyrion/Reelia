name: Android CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: timeline-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish debug APK as a rolling GitHub Release
        if: github.ref == 'refs/heads/main' && (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          target_commitish: ${{ github.sha }}
          name: "Reelia — latest debug build"
          body: >
            Automated debug APK build from the latest CI run on
            `${{ github.ref_name }}` (${{ github.sha }}). Not signed for
            release — for local testing only, and unrelated to versioned
            releases (see the "Latest" release for those).
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: timeline-debug-apk
          path: dist

      - name: Publish versioned GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Reelia ${{ github.ref_name }}"
          body: >
            Notes de version complètes dans l'appli (Profil > Notes de version)
            ou docs/release-notes/fr.md (docs/release-notes/en.md en anglais).
          prerelease: false
          files: dist/*.apk
