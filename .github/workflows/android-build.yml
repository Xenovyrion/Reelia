name: Android CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the v prefix (e.g. 0.13.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: timeline-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish debug APK as a rolling GitHub Release
        if: github.ref == 'refs/heads/main' && (github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push')
        uses: softprops/action-gh-release@v2
        with:
          repository: Xenovyrion/reelia-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          tag_name: debug-latest
          target_commitish: main
          name: "Reelia — build de test"
          body: >
            Build de test généré automatiquement depuis le commit
            Xenovyrion/Reelia@${{ github.sha }}. Marqué "Pre-release" par GitHub
            (pas un brouillon) car c'est un canal de test continu, republié à
            chaque push — pas une version numérotée. Voir la section "Releases"
            pour les vraies versions (`vX.Y.Z`).
          prerelease: true
          files: app/build/outputs/apk/debug/*.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: timeline-debug-apk
          path: dist

      - name: Compute tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish versioned GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repository: Xenovyrion/reelia-content
          token: ${{ secrets.CONTENT_REPO_TOKEN }}
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: main
          name: "Reelia ${{ steps.tag.outputs.name }}"
          body: >
            Version ${{ steps.tag.outputs.name }}, buildée depuis Xenovyrion/Reelia@${{ github.sha }}.
            Notes de version complètes dans l'appli (Profil > Notes de version)
            ou docs/release-notes/fr.md (docs/release-notes/en.md en anglais).
          prerelease: false
          files: dist/*.apk
